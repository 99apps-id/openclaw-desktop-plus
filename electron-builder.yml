appId: com.openclaw.desktop-plus
productName: OpenClaw Desktop Plus
copyright: Copyright © 2026 99apps.id

directories:
  output: dist
  buildResources: resources

electronDist: node_modules/electron/dist

asar: true
compression: normal

extraResources:
  - from: resources/node
    to: node
    filter:
      - "**/*"
  - from: resources/openclaw
    to: openclaw
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: "OpenClaw-Desktop-Plus-Setup-${version}.${ext}"
  # Sign when CSC_LINK + CSC_KEY_PASSWORD are set in CI
  signAndEditExecutable: true

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  displayLanguageSelector: true
  multiLanguageInstaller: true
  installerLanguages:
    - en_US
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerSidebar: resources/installer/installer-sidebar.bmp
  license: resources/installer/license.txt
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OpenClaw Desktop Plus
  runAfterFinish: true
  deleteAppDataOnUninstall: false

files:
  - "out/**/*"
  - "package.json"
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!scripts/**/*"
  - "!build/**/*"
  - "!docs/**/*"
  - "!.cobrain/**/*"
  - "!.github/**/*"
  - "!resources/node/**/*"
  - "!resources/openclaw/**/*"
